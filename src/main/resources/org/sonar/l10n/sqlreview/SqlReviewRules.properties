# SQL Review Rules Description

SQL-001.name=WHERE 条件字段缺少索引
SQL-001.description=WHERE 子句中使用的字段在生产数据库中没有索引，可能导致性能问题。

SQL-002.name=大表全表扫描
SQL-002.description=对大表（超过阈值行数）执行无 WHERE 条件或条件无索引的查询。

SQL-003.name=使用 SELECT *
SQL-003.description=使用 SELECT * 会返回不必要的列，增加网络传输和内存消耗。

SQL-004.name=索引列使用函数导致索引失效
SQL-004.description=在 WHERE 条件中对索引列使用函数会导致索引失效，触发全表扫描。

SQL-101.name=大表查询无 LIMIT
SQL-101.description=对大表执行查询未设置 LIMIT，可能返回过多数据。

SQL-103.name=LIKE 以 % 开头
SQL-103.description=LIKE '%xxx' 模式无法使用索引，会导致全表扫描。

SQL-201.name=动态 SQL 拼接风险
SQL-201.description=使用 ${} 进行 SQL 拼接存在 SQL 注入风险，应使用 #{} 参数化查询。

# Java Lambda 规则
SQL-301.name=Lambda selectAll() 等价于 SELECT *
SQL-301.description=使用 Lambda Wrapper 的 selectAll() 方法等价于 SELECT *，应使用 select() 指定需要的字段。

SQL-302.name=Lambda 查询缺少 WHERE 条件
SQL-302.description=Lambda 查询链中没有添加任何 WHERE 条件，将导致全表扫描。

SQL-303.name=Lambda WHERE 条件字段缺少索引
SQL-303.description=Lambda 查询 WHERE 条件字段在生产数据库中缺少索引，可能导致全表扫描。

SQL-304.name=Lambda LIKE 以 % 开头
SQL-304.description=Lambda LIKE 查询值以 % 开头，无法使用索引，会导致全表扫描。

SQL-305.name=Lambda 大表查询无 LIMIT
SQL-305.description=对大表执行 Lambda 查询没有 LIMIT 或分页保护，可能返回海量数据。

SQL-306.name=Lambda .apply() 中索引列使用函数导致索引失效
SQL-306.description=Lambda .apply() 方法中的原始 SQL 片段对索引列使用函数（如 YEAR/DATE/UPPER），导致索引失效。
